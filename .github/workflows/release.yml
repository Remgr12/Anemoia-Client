name: Release

on:
  push:
    branches: [main]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect version change
        id: ver
        run: |
          CURRENT=$(grep '^version' Cargo.toml | head -1 | cut -d'"' -f2)
          PREVIOUS=$(git show HEAD~1:Cargo.toml 2>/dev/null | grep '^version' | head -1 | cut -d'"' -f2 || echo "0.0.0")
          echo "current=$CURRENT"  >> "$GITHUB_OUTPUT"
          echo "previous=$PREVIOUS" >> "$GITHUB_OUTPUT"
          if [ "$CURRENT" != "$PREVIOUS" ]; then
            echo "changed=true"  >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Rust toolchain
        if: steps.ver.outputs.changed == 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        if: steps.ver.outputs.changed == 'true'
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install system dependencies
        if: steps.ver.outputs.changed == 'true'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libfontconfig1-dev \
            libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libxkbcommon-dev \
            libssl-dev

      - name: Build release
        if: steps.ver.outputs.changed == 'true'
        run: cargo build --release

      - name: Package artifacts
        if: steps.ver.outputs.changed == 'true'
        run: |
          VERSION="${{ steps.ver.outputs.current }}"
          PKG="anemoia-v${VERSION}-linux-x86_64"
          mkdir -p "$PKG"
          cp target/release/anemoia-inject    "$PKG/"
          cp target/release/anemoia-launcher  "$PKG/"
          cp target/release/libanemoia_client.so "$PKG/"
          cp target/release/libagent_loader.so   "$PKG/"
          cp -r scripts                           "$PKG/"
          cp install.sh                           "$PKG/"
          chmod +x "$PKG/install.sh"
          tar -czf "${PKG}.tar.gz" "$PKG/"
          echo "PKG=$PKG" >> "$GITHUB_ENV"

      - name: Create GitHub Release
        if: steps.ver.outputs.changed == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.current }}
          name: Anemoia v${{ steps.ver.outputs.current }}
          generate_release_notes: true
          files: anemoia-v${{ steps.ver.outputs.current }}-linux-x86_64.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
